services:
  mango:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8080:8080"
    restart: unless-stopped

  papaya:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8081:8080"
    restart: unless-stopped

  guava:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8082:8080"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:80"
    restart: unless-stopped
